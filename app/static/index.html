<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nota.ai</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #f5f0e8;
      --surface: #ede8dd;
      --border:  #cfc8bc;
      --text:    #2d2a26;
      --muted:   #9a8f82;
      --accent:  #b85c38;
      --accent-h:#a04e2e;
      --s0: #b85c38;
      --s1: #3d6b50;
      --s2: #7a5c2e;
      --s3: #4a6b8a;
      --s4: #8a4a6b;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
      font-size: 15px;
      line-height: 1.6;
      max-width: 680px;
      margin: 0 auto;
      padding: 3.5rem 1.5rem 5rem;
    }

    header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 2rem;
      border-bottom: 1.5px solid var(--border);
      padding-bottom: 1.25rem;
    }

    .header-left { display: flex; align-items: baseline; gap: 0.6rem; }
    .header-right { display: flex; align-items: center; gap: 0.4rem; }

    header h1 {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 1.4rem;
      font-weight: normal;
      letter-spacing: -0.01em;
      color: var(--text);
    }

    header span {
      font-size: 0.75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    /* ── Tabs ── */
    .tabs { display: flex; gap: 0; }
    .tab {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
      padding: 0.25rem 0.75rem;
      cursor: pointer;
      border: 1.5px solid var(--border);
      background: var(--surface);
      transition: color 0.15s, background 0.15s;
      user-select: none;
    }
    .tab:first-child { border-radius: 4px 0 0 4px; }
    .tab:last-child  { border-radius: 0 4px 4px 0; border-left: none; }
    .tab.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }

    /* ── Archive list ── */
    #archive-view { display: none; }
    .archive-empty { font-size: 0.88rem; color: var(--muted); padding: 2rem 0; text-align: center; }
    .archive-list { border-top: 1.5px solid var(--border); }
    .archive-entry {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      padding: 0.8rem 0;
      border-bottom: 1px solid var(--surface);
      cursor: pointer;
      transition: background 0.1s;
      border-radius: 3px;
      gap: 1rem;
    }
    .archive-entry:hover { background: rgba(0,0,0,0.025); margin: 0 -0.5rem; padding: 0.8rem 0.5rem; }
    .entry-name { font-size: 0.9rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .entry-meta { font-size: 0.75rem; color: var(--muted); margin-top: 0.15rem; }
    .entry-right { display: flex; align-items: center; gap: 0.75rem; flex-shrink: 0; }
    .entry-date { font-size: 0.75rem; color: var(--muted); white-space: nowrap; }
    .entry-delete {
      font-size: 0.75rem;
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0.1rem 0.3rem;
      border-radius: 3px;
      transition: color 0.15s, background 0.15s;
      line-height: 1;
    }
    .entry-delete:hover { color: var(--accent); background: var(--surface); }
    .entry-rename-btn {
      font-size: 0.75rem;
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0.1rem 0.3rem;
      border-radius: 3px;
      transition: color 0.15s, background 0.15s;
      line-height: 1;
    }
    .entry-rename-btn:hover { color: var(--accent); background: var(--surface); }
    /* ── Result title ── */
    .result-title-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.9rem;
    }
    .result-title {
      font-family: Georgia, serif;
      font-size: 1.05rem;
      color: var(--text);
      flex: 1;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .rename-title-btn {
      flex-shrink: 0;
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0.15rem 0.3rem;
      border-radius: 3px;
      line-height: 1;
      transition: color 0.15s, background 0.15s;
    }
    .rename-title-btn:hover { color: var(--accent); background: var(--surface); }
    .rename-input {
      font-family: inherit;
      font-size: inherit;
      color: var(--text);
      background: var(--surface);
      border: 1.5px solid var(--accent);
      border-radius: 3px;
      padding: 0.1rem 0.35rem;
      outline: none;
      flex: 1;
      min-width: 0;
      width: 100%;
    }

    /* ── Upload ── */
    #drop-zone {
      border: 1.5px dashed var(--border);
      border-radius: 5px;
      padding: 2.25rem 1.5rem;
      text-align: center;
      cursor: pointer;
      background: var(--surface);
      transition: border-color 0.15s, background 0.15s;
      color: var(--muted);
      font-size: 0.9rem;
      user-select: none;
    }
    #drop-zone em {
      font-style: normal;
      color: var(--accent);
      text-decoration: underline;
      text-decoration-style: dotted;
      text-underline-offset: 3px;
    }
    #drop-zone small { display: block; margin-top: 0.35rem; font-size: 0.78rem; color: var(--muted); }
    #drop-zone:hover, #drop-zone.drag-over { border-color: var(--accent); background: #e8e2d5; }
    #drop-zone.has-file { border-style: solid; border-color: var(--accent); color: var(--text); }
    #file-input { display: none; }

    .fields {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
      margin-top: 0.75rem;
    }

    .field label {
      display: block;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
      margin-bottom: 0.3rem;
    }

    .field input[type="number"] {
      width: 100%;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 4px;
      padding: 0.45rem 0.7rem;
      color: var(--text);
      font-size: 0.9rem;
      font-family: inherit;
      transition: border-color 0.15s;
      -moz-appearance: textfield;
    }
    .field input[type="number"]::-webkit-inner-spin-button { opacity: 0.4; }
    .field input[type="number"]:focus { outline: none; border-color: var(--accent); }

    /* ── Mode toggle ── */
    .mode-toggle {
      display: flex;
      border: 1.5px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      width: fit-content;
      margin-bottom: 1rem;
    }
    .mode-btn {
      font-family: inherit;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
      background: var(--surface);
      border: none;
      padding: 0.35rem 1rem;
      cursor: pointer;
      transition: color 0.15s, background 0.15s;
    }
    .mode-btn + .mode-btn { border-left: 1.5px solid var(--border); }
    .mode-btn.active { background: var(--text); color: var(--bg); }

    /* ── Record ── */
    .device-select {
      width: 100%;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 4px;
      padding: 0.45rem 0.7rem;
      color: var(--text);
      font-size: 0.9rem;
      font-family: inherit;
      cursor: pointer;
    }
    .device-select:focus { outline: none; border-color: var(--accent); }

    .record-box {
      border: 1.5px dashed var(--border);
      border-radius: 5px;
      padding: 1.75rem 1.5rem 1.25rem;
      background: var(--surface);
      text-align: center;
      margin: 0.75rem 0;
      transition: border-color 0.2s, border-style 0.2s;
    }
    .record-box.active { border-style: solid; border-color: #c0392b; }

    .record-timer {
      font-family: 'Courier New', Courier, monospace;
      font-size: 2rem;
      letter-spacing: 0.06em;
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }
    .record-status {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 0.3rem;
      min-height: 1.3em;
    }
    .rec-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #c0392b;
      display: none;
      flex-shrink: 0;
    }
    .record-box.active .rec-dot { display: block; animation: blink 1.2s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

    .meter-track {
      height: 2px;
      background: var(--border);
      border-radius: 999px;
      overflow: hidden;
      margin-top: 1rem;
    }
    .meter-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 999px;
      width: 0%;
      transition: width 0.06s linear;
    }

    #record-btn {
      display: block;
      width: 100%;
      margin-top: 0.75rem;
      padding: 0.65rem 1.5rem;
      background: #c0392b;
      color: var(--bg);
      border: none;
      border-radius: 4px;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 500;
      letter-spacing: 0.01em;
      cursor: pointer;
      transition: background 0.15s;
    }
    #record-btn:hover:not(:disabled) { background: #a93226; }
    #record-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    #record-btn.recording { background: #a93226; }

    #transcribe-btn {
      display: block;
      width: 100%;
      margin-top: 0.75rem;
      padding: 0.65rem 1.5rem;
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: 4px;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 500;
      letter-spacing: 0.01em;
      cursor: pointer;
      transition: background 0.15s;
    }
    #transcribe-btn:hover:not(:disabled) { background: var(--accent-h); }
    #transcribe-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── Progress ── */
    #progress-section { display: none; margin-top: 1.75rem; }

    .progress-track {
      height: 2px;
      background: var(--border);
      border-radius: 999px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 999px;
      transition: width 0.5s ease;
      width: 0%;
    }
    #stage-text {
      margin-top: 0.6rem;
      font-size: 0.8rem;
      color: var(--muted);
      letter-spacing: 0.02em;
    }

    /* ── Result ── */
    #result-section { display: none; margin-top: 1.75rem; }

    audio {
      width: 100%;
      margin-bottom: 1.25rem;
      accent-color: var(--accent);
      border-radius: 3px;
    }

    .transcript-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.6rem;
    }
    .transcript-bar span {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--muted);
    }
    .dl-links { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .dl-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.72rem;
      font-family: inherit;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 4px;
      padding: 0.25rem 0.6rem;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
      text-decoration: none;
    }
    .dl-btn:hover { color: var(--accent); border-color: var(--accent); background: #ece6d8; }
    .dl-btn svg { flex-shrink: 0; }

    /* ── Transcript ── */
    #transcript { border-top: 1.5px solid var(--border); }

    .turn {
      display: grid;
      grid-template-columns: 108px 1fr;
      gap: 1.25rem;
      padding: 0.85rem 0;
      border-bottom: 1px solid var(--surface);
      cursor: pointer;
      transition: background 0.1s;
      border-radius: 3px;
    }
    .turn:hover { background: rgba(0,0,0,0.025); margin: 0 -0.5rem; padding: 0.85rem 0.5rem; }

    .turn-meta { padding-top: 0.15rem; }

    .turn-speaker {
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.09em;
    }
    .turn-time {
      font-size: 0.72rem;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      font-family: 'Courier New', Courier, monospace;
      margin-top: 0.15rem;
    }
    .turn-text {
      font-size: 0.93rem;
      line-height: 1.65;
      color: var(--text);
    }

    .SPEAKER_00 .turn-speaker { color: var(--s0); }
    .SPEAKER_01 .turn-speaker { color: var(--s1); }
    .SPEAKER_02 .turn-speaker { color: var(--s2); }
    .SPEAKER_03 .turn-speaker { color: var(--s3); }
    .SPEAKER_04 .turn-speaker { color: var(--s4); }

    /* ── Speaker legend ── */
    #speaker-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }
    .speaker-chip {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 4px;
      padding: 0.3rem 0.5rem;
    }
    .chip-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .SPEAKER_00 .chip-dot, .chip-dot.s0 { background: var(--s0); }
    .SPEAKER_01 .chip-dot, .chip-dot.s1 { background: var(--s1); }
    .SPEAKER_02 .chip-dot, .chip-dot.s2 { background: var(--s2); }
    .SPEAKER_03 .chip-dot, .chip-dot.s3 { background: var(--s3); }
    .SPEAKER_04 .chip-dot, .chip-dot.s4 { background: var(--s4); }
    .chip-input {
      background: transparent;
      border: none;
      outline: none;
      font-family: inherit;
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text);
      width: 9ch;
      min-width: 6ch;
    }
    .chip-input:focus { border-bottom: 1px solid var(--accent); }

    /* ── Settings button ── */
    .settings-btn {
      font-size: 0.95rem;
      color: var(--muted);
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 4px;
      padding: 0.25rem 0.55rem;
      cursor: pointer;
      line-height: 1.31;
      transition: color 0.15s, background 0.15s, border-color 0.15s;
    }
    .settings-btn:hover { color: var(--accent); border-color: var(--accent); }

    /* ── Settings overlay ── */
    #settings-overlay {
      position: fixed; inset: 0;
      background: rgba(45, 42, 38, 0.45);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .settings-panel {
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 6px;
      padding: 1.75rem;
      width: min(480px, calc(100vw - 2rem));
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    }
    .settings-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.25rem;
    }
    .settings-panel-header span {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }
    .settings-close {
      background: none; border: none;
      color: var(--muted); cursor: pointer;
      font-size: 1rem; padding: 0.1rem 0.3rem;
      border-radius: 3px; line-height: 1;
      transition: color 0.15s, background 0.15s;
    }
    .settings-close:hover { color: var(--accent); background: var(--surface); }
    .provider-tiles {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.5rem;
      margin-bottom: 1.25rem;
    }
    .provider-tile {
      font-family: inherit;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 4px;
      padding: 0.45rem 0.5rem;
      cursor: pointer;
      transition: color 0.15s, background 0.15s, border-color 0.15s;
      text-align: center;
    }
    .provider-tile:hover { border-color: var(--accent); color: var(--text); }
    .provider-tile.active { border-color: var(--accent); background: #f5ece7; color: var(--accent); }
    #settings-fields { margin-bottom: 1.1rem; }
    .settings-field { margin-bottom: 0.75rem; }
    .settings-field label {
      display: block;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
      margin-bottom: 0.3rem;
    }
    .settings-field input {
      width: 100%;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 4px;
      padding: 0.45rem 0.7rem;
      color: var(--text);
      font-size: 0.9rem;
      font-family: inherit;
      transition: border-color 0.15s;
      box-sizing: border-box;
    }
    .settings-field input:focus { outline: none; border-color: var(--accent); }
    .settings-field select {
      width: 100%;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 4px;
      padding: 0.45rem 0.7rem;
      color: var(--text);
      font-size: 0.9rem;
      font-family: inherit;
      cursor: pointer;
      box-sizing: border-box;
    }
    .settings-field select:focus { outline: none; border-color: var(--accent); }
    .settings-field select:disabled { opacity: 0.5; cursor: not-allowed; }
    .model-hint {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 0.3rem;
    }
    .model-hint.error { color: var(--accent); }
    .key-row { display: flex; gap: 0.4rem; align-items: center; }
    .key-row input { flex: 1; }
    .eye-btn {
      background: none; border: 1.5px solid var(--border);
      border-radius: 4px; padding: 0.4rem 0.55rem;
      color: var(--muted); cursor: pointer; font-size: 0.8rem;
      transition: color 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }
    .eye-btn:hover { color: var(--accent); border-color: var(--accent); }
    .settings-actions {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.75rem;
    }
    #test-btn {
      font-family: inherit;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 4px;
      padding: 0.4rem 0.9rem;
      color: var(--muted);
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
      white-space: nowrap;
    }
    #test-btn:hover { color: var(--accent); border-color: var(--accent); }
    #test-result {
      font-size: 0.78rem;
      flex: 1;
      transition: color 0.2s;
    }
    #test-result.ok    { color: #3d6b50; }
    #test-result.error { color: var(--accent); }
    #settings-save-btn {
      font-family: inherit;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      background: var(--accent);
      border: 1.5px solid var(--accent);
      border-radius: 4px;
      padding: 0.4rem 1.1rem;
      color: var(--bg);
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
      margin-left: auto;
    }
    #settings-save-btn:hover { background: var(--accent-h); }
    .settings-note {
      font-size: 0.72rem;
      color: var(--muted);
      text-align: right;
    }

    /* ── Summary panel ── */
    #summary-section {
      border: 1.5px solid var(--border);
      border-radius: 5px;
      margin-bottom: 1.1rem;
      background: var(--surface);
      overflow: hidden;
    }
    .summary-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.55rem 0.9rem;
      cursor: pointer;
      user-select: none;
      transition: background 0.1s;
    }
    .summary-header:hover { background: rgba(0,0,0,0.03); }
    .summary-header span:first-child {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }
    .summary-chevron { font-size: 0.75rem; color: var(--muted); transition: transform 0.2s; }
    .summary-chevron.collapsed { transform: rotate(-90deg); }
    #summary-body { padding: 0 0.9rem 0.9rem; }
    #summary-content {
      font-size: 0.9rem;
      line-height: 1.65;
      color: var(--text);
    }
    #summary-content ul { padding-left: 1.1rem; margin: 0; }
    #summary-content li { margin-bottom: 0.25rem; }
    .summary-loading {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 0.82rem;
      color: var(--muted);
      padding: 0.2rem 0;
    }
    .summary-spinner {
      width: 14px; height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #summary-error { font-size: 0.82rem; color: var(--accent); padding: 0.2rem 0; }
    .summarize-btn { color: var(--accent) !important; border-color: var(--accent) !important; }
    .summarize-btn:hover { background: #f5ece7 !important; }
  </style>
</head>
<body>
  <header>
    <div class="header-left">
      <h1>Nota.ai</h1>
      <span>local &middot; on-device</span>
    </div>
    <div class="header-right">
      <div class="tabs">
        <div class="tab active" onclick="switchTab('transcribe')">New</div>
        <div class="tab" onclick="switchTab('archive')">Archive</div>
      </div>
      <button class="settings-btn" onclick="openSettings()" title="AI Provider Settings">⚙</button>
    </div>
  </header>

  <div id="archive-view">
    <div class="archive-list" id="archive-list"></div>
  </div>

  <section id="upload-section">
    <div class="mode-toggle">
      <button class="mode-btn active" id="mode-upload-btn" onclick="switchInputMode('upload')">Upload</button>
      <button class="mode-btn"        id="mode-record-btn" onclick="switchInputMode('record')">Record</button>
    </div>

    <!-- Upload mode -->
    <div id="upload-content">
      <div id="drop-zone">
        <input type="file" id="file-input" accept="audio/*,video/*">
        Drop a file or <em>browse</em>
        <small>MP3 &middot; M4A &middot; WAV &middot; MP4 &mdash; up to 90 min</small>
      </div>
      <div class="fields">
        <div class="field">
          <label for="min-speakers">Min speakers</label>
          <input type="number" id="min-speakers" placeholder="optional" min="1">
        </div>
        <div class="field">
          <label for="max-speakers">Max speakers</label>
          <input type="number" id="max-speakers" placeholder="optional" min="1">
        </div>
      </div>
      <button id="transcribe-btn" disabled>Transcribe</button>
    </div>

    <!-- Record mode -->
    <div id="record-content" style="display:none">
      <div class="field">
        <label for="audio-device">Audio source</label>
        <select id="audio-device" class="device-select"></select>
      </div>
      <div class="record-box" id="record-box">
        <div class="record-timer" id="record-timer">00:00:00</div>
        <div class="record-status">
          <span class="rec-dot"></span>
          <span id="record-status-text">Ready to record</span>
        </div>
        <div class="meter-track"><div class="meter-fill" id="meter-fill"></div></div>
      </div>
      <div class="fields">
        <div class="field">
          <label for="rec-min-speakers">Min speakers</label>
          <input type="number" id="rec-min-speakers" placeholder="optional" min="1">
        </div>
        <div class="field">
          <label for="rec-max-speakers">Max speakers</label>
          <input type="number" id="rec-max-speakers" placeholder="optional" min="1">
        </div>
      </div>
      <button id="record-btn" onclick="toggleRecording()">Start Recording</button>
    </div>
  </section>

  <section id="progress-section">
    <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
    <div id="stage-text">Starting…</div>
  </section>

  <section id="result-section">
    <div class="result-title-row">
      <span id="result-title" class="result-title"></span>
      <button class="rename-title-btn" onclick="activateRenameTitle()" title="Rename"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M8.5 1.5a1.414 1.414 0 0 1 2 2L3.5 10.5 1 11l.5-2.5 7-7z" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
    </div>
    <audio id="audio-player" controls></audio>

    <div id="summary-section" style="display:none">
      <div class="summary-header" onclick="toggleSummaryPanel()">
        <span>Summary</span>
        <span class="summary-chevron" id="summary-chevron">▾</span>
      </div>
      <div id="summary-body">
        <div id="summary-loading" class="summary-loading" style="display:none">
          <div class="summary-spinner"></div>
          <span id="summary-stage-text">Summarizing…</span>
        </div>
        <div id="summary-content"></div>
        <div id="summary-error" style="display:none"></div>
      </div>
    </div>

    <div id="speaker-legend"></div>
    <div class="transcript-bar">
      <span>Transcript</span>
      <div class="dl-links">
        <button class="dl-btn" id="copy-btn" onclick="copyTranscript()"><svg width="11" height="11" viewBox="0 0 11 11" fill="none"><rect x="1" y="3" width="7" height="7" rx="1.2" stroke="currentColor" stroke-width="1.4"/><path d="M3 3V2a1 1 0 0 1 1-1h5a1 1 0 0 1 1 1v5a1 1 0 0 1-1 1H8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>Copy</button>
        <button class="dl-btn" onclick="dlFile('txt')"><svg width="10" height="11" viewBox="0 0 10 11" fill="none"><path d="M5 1v7M2 8l3 3 3-3M1 10h8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>TXT</button>
        <button class="dl-btn" onclick="dlFile('md')"><svg width="10" height="11" viewBox="0 0 10 11" fill="none"><path d="M5 1v7M2 8l3 3 3-3M1 10h8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>Markdown</button>
        <button class="dl-btn" onclick="dlPDF()"><svg width="10" height="11" viewBox="0 0 10 11" fill="none"><path d="M5 1v7M2 8l3 3 3-3M1 10h8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>PDF</button>
        <button class="dl-btn summarize-btn" id="summarize-btn" onclick="requestSummary()">✦ Summarize</button>
      </div>
    </div>
    <div id="transcript"></div>
  </section>

  <div id="settings-overlay" style="display:none" onclick="closeSettingsIfOutside(event)">
    <div class="settings-panel">
      <div class="settings-panel-header">
        <span>AI Provider</span>
        <button class="settings-close" onclick="closeSettings()">✕</button>
      </div>
      <div class="provider-tiles" id="provider-tiles"></div>
      <div id="settings-fields"></div>
      <div class="settings-actions">
        <button id="test-btn" onclick="testProvider()">Test Connection</button>
        <span id="test-result"></span>
        <button id="settings-save-btn" onclick="saveSettings()">Save</button>
      </div>
      <div class="settings-note">Key stored locally on this device</div>
    </div>
  </div>

  <script>
    const dropZone      = document.getElementById('drop-zone');
    const fileInput     = document.getElementById('file-input');
    const transcribeBtn = document.getElementById('transcribe-btn');
    const progressSec   = document.getElementById('progress-section');
    const progressFill  = document.getElementById('progress-fill');
    const stageText     = document.getElementById('stage-text');
    const resultSec     = document.getElementById('result-section');
    const audioPlayer   = document.getElementById('audio-player');
    const transcriptEl  = document.getElementById('transcript');
    const legendEl      = document.getElementById('speaker-legend');

    let selectedFile    = null;
    let currentJobId   = null;   // job UUID (live) or archive UUID
    let isLiveJob      = false;  // true = result still in memory, false = loaded from archive
    let speakerNames   = {};     // { SPEAKER_00: "Alice", … }
    let currentFilename = null;

    const SPEAKER_COLORS = ['s0','s1','s2','s3','s4'];

    function displayName(id) {
      return speakerNames[id] || id.replace('SPEAKER_', 'Speaker ');
    }

    // ── Upload ────────────────────────────────────────────────────────────────

    dropZone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', () => setFile(fileInput.files[0]));
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      setFile(e.dataTransfer.files[0]);
    });

    function setFile(file) {
      if (!file) return;
      selectedFile = file;
      dropZone.classList.add('has-file');
      dropZone.innerHTML = `<strong>${file.name}</strong><small>${(file.size / 1e6).toFixed(1)} MB</small>`;
      transcribeBtn.disabled = false;
    }

    transcribeBtn.addEventListener('click', async () => {
      if (!selectedFile) return;
      transcribeBtn.disabled = true;
      progressSec.style.display = 'block';
      resultSec.style.display   = 'none';
      setProgress(0, 'Uploading…');

      const form   = new FormData();
      form.append('file', selectedFile);
      const params = new URLSearchParams();
      const minS   = document.getElementById('min-speakers').value;
      const maxS   = document.getElementById('max-speakers').value;
      if (minS) params.set('min_speakers', minS);
      if (maxS) params.set('max_speakers', maxS);

      const res        = await fetch(`/transcribe?${params}`, { method: 'POST', body: form });
      const { job_id } = await res.json();
      currentJobId     = job_id;
      isLiveJob        = true;
      audioPlayer.src  = URL.createObjectURL(selectedFile);
      listenProgress(job_id);
    });

    function setProgress(pct, message) {
      progressFill.style.width = pct + '%';
      stageText.textContent    = message;
    }

    function listenProgress(jobId) {
      const es = new EventSource(`/progress/${jobId}`);
      es.onmessage = e => {
        const data = JSON.parse(e.data);
        setProgress(data.pct ?? 0, data.message ?? data.stage);
        if (data.stage === 'done')  { es.close(); loadLiveResult(jobId); }
        if (data.stage === 'error') { es.close(); stageText.textContent = 'Error: ' + data.message; }
      };
    }

    async function loadLiveResult(jobId) {
      const res  = await fetch(`/result/${jobId}/json`);
      const data = await res.json();
      setResultTitle(selectedFile ? selectedFile.name : '');
      showSegments(data.segments);
      resultSec.style.display = 'block';
    }

    function setResultTitle(name) {
      currentFilename = name;
      document.getElementById('result-title').textContent = name;
    }

    // ── Shared render ─────────────────────────────────────────────────────────

    function showSegments(segments, savedNames = {}) {
      speakerNames = {};
      resetSummaryPanel();
      const seen = [];
      segments.forEach(s => { if (!seen.includes(s.speaker)) seen.push(s.speaker); });
      renderLegend(seen, savedNames);
      renderTranscript(segments);
    }

    let _saveNamesTimer = null;

    function saveNamesDebounced() {
      if (isLiveJob || !currentJobId) return;
      clearTimeout(_saveNamesTimer);
      _saveNamesTimer = setTimeout(() => {
        fetch(`/archive/${currentJobId}/names`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(speakerNames),
        });
      }, 600);
    }

    function renderLegend(speakers, savedNames = {}) {
      // Merge saved names into speakerNames
      Object.assign(speakerNames, savedNames);

      legendEl.innerHTML = speakers.map((id, i) => {
        const color = SPEAKER_COLORS[i % SPEAKER_COLORS.length];
        return `<div class="speaker-chip">
          <div class="chip-dot ${color}"></div>
          <input class="chip-input" data-id="${id}" value="${escapeHtml(displayName(id))}" placeholder="Name…">
        </div>`;
      }).join('');

      legendEl.querySelectorAll('.chip-input').forEach(input => {
        input.addEventListener('input', () => {
          const val = input.value.trim();
          speakerNames[input.dataset.id] = val || null;
          transcriptEl.querySelectorAll(`.${input.dataset.id} .turn-speaker`).forEach(el => {
            el.textContent = displayName(input.dataset.id);
          });
          saveNamesDebounced();
        });
        input.addEventListener('focus', () => input.select());
      });
    }

    function renderTranscript(segments) {
      transcriptEl.innerHTML = segments.map(seg => {
        const mins = Math.floor(seg.start / 60).toString().padStart(2, '0');
        const secs = Math.floor(seg.start % 60).toString().padStart(2, '0');
        return `<div class="turn ${seg.speaker}" data-start="${seg.start}">
          <div class="turn-meta">
            <div class="turn-speaker">${displayName(seg.speaker)}</div>
            <div class="turn-time">${mins}:${secs}</div>
          </div>
          <div class="turn-text">${escapeHtml(seg.text)}</div>
        </div>`;
      }).join('');

      transcriptEl.querySelectorAll('.turn').forEach(el => {
        el.addEventListener('click', () => {
          audioPlayer.currentTime = parseFloat(el.dataset.start);
          audioPlayer.play();
        });
      });
    }

    async function dlFile(fmt) {
      if (!currentJobId) return;
      const url = isLiveJob
        ? `/result/${currentJobId}/${fmt}`
        : `/archive/${currentJobId}/download/${fmt}`;
      try {
        const res = await fetch(url);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        let text = await res.text();
        Object.entries(speakerNames).forEach(([id, name]) => {
          if (name) text = text.replaceAll(id, name);
        });
        triggerDownload(new Blob([text], { type: 'text/plain' }), `transcript.${fmt}`);
      } catch (e) {
        alert('Download failed: ' + e.message);
      }
    }

    function copyTranscript() {
      const turns = [...transcriptEl.querySelectorAll('.turn')];
      if (!turns.length) return;
      const text = turns.map(el => {
        const speaker = el.querySelector('.turn-speaker').textContent;
        const time    = el.querySelector('.turn-time').textContent;
        const body    = el.querySelector('.turn-text').textContent.trim();
        return `[${speaker} ${time}]\n${body}`;
      }).join('\n\n');
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.getElementById('copy-btn');
        const prev = btn.innerHTML;
        btn.innerHTML = '<svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M1.5 6l3 3 5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>Copied!';
        btn.style.color = 'var(--accent)';
        btn.style.borderColor = 'var(--accent)';
        setTimeout(() => { btn.innerHTML = prev; btn.style.color = ''; btn.style.borderColor = ''; }, 1800);
      });
    }

    function dlPDF() {
      if (!currentJobId) return;
      const rows = [...transcriptEl.querySelectorAll('.turn')].map(el => {
        const speaker = el.querySelector('.turn-speaker').textContent;
        const time    = el.querySelector('.turn-time').textContent;
        const text    = el.querySelector('.turn-text').textContent;
        return `<div class="turn">
          <div class="meta"><span class="spk">${speaker}</span><span class="ts">${time}</span></div>
          <div class="txt">${text}</div>
        </div>`;
      }).join('');

      const win = window.open('', '_blank');
      win.document.write(`<!DOCTYPE html><html><head><title>Transcript</title>
<style>
  body { font-family: Georgia, serif; max-width: 640px; margin: 2.5cm auto; font-size: 11pt; line-height: 1.65; color: #2d2a26; }
  h1 { font-weight: normal; font-size: 1.3rem; margin-bottom: 2rem; border-bottom: 1px solid #ccc; padding-bottom: 0.75rem; }
  .turn { display: grid; grid-template-columns: 100px 1fr; gap: 1rem; padding: 0.7rem 0; border-bottom: 1px solid #f0ece4; }
  .meta { padding-top: 0.1rem; }
  .spk { display: block; font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; }
  .ts  { display: block; font-size: 0.72rem; color: #9a8f82; font-family: monospace; margin-top: 0.1rem; }
  .txt { font-size: 0.97rem; }
  @media print { body { margin: 1.5cm; } }
</style></head><body>
<h1>Transcript</h1>${rows}
<script>setTimeout(() => { window.print(); }, 400);<\/script>
</body></html>`);
      win.document.close();
    }

    function triggerDownload(blob, filename) {
      const url = URL.createObjectURL(blob);
      const a   = document.createElement('a');
      a.href    = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

    function escapeHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // ── Tabs ──────────────────────────────────────────────────────────────────

    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach((el, i) => {
        el.classList.toggle('active', (i === 0) === (tab === 'transcribe'));
      });
      document.getElementById('archive-view').style.display   = tab === 'archive'    ? 'block' : 'none';
      document.getElementById('upload-section').style.display = tab === 'transcribe' ? 'block' : 'none';
      progressSec.style.display = 'none';
      resultSec.style.display   = 'none';
      if (tab === 'archive') loadArchive();
    }

    // ── Archive ───────────────────────────────────────────────────────────────

    async function loadArchive() {
      const entries = await fetch('/archive').then(r => r.json());
      const el = document.getElementById('archive-list');
      if (!entries.length) {
        el.innerHTML = '<div class="archive-empty">No transcriptions yet.</div>';
        return;
      }
      el.innerHTML = entries.map(e => {
        const date = new Date(e.created_at).toLocaleDateString('de-DE', { day:'2-digit', month:'short', year:'numeric' });
        const dur     = fmtDuration(e.duration_s);
        const spk     = e.speaker_count === 1 ? '1 speaker' : `${e.speaker_count} speakers`;
        const sumBadge = e.has_summary ? ' &middot; <span style="color:var(--accent)">✦</span>' : '';
        return `<div class="archive-entry" onclick="loadArchiveEntry('${e.id}')">
          <div style="min-width:0">
            <div class="entry-name">${escapeHtml(e.filename)}</div>
            <div class="entry-meta">${dur} &middot; ${spk}${sumBadge}</div>
          </div>
          <div class="entry-right">
            <div class="entry-date">${date}</div>
            <button class="entry-rename-btn" title="Rename" onclick="startArchiveRename(event,'${e.id}',this)"><svg width="10" height="10" viewBox="0 0 12 12" fill="none"><path d="M8.5 1.5a1.414 1.414 0 0 1 2 2L3.5 10.5 1 11l.5-2.5 7-7z" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
            <button class="entry-delete" title="Delete" onclick="deleteEntry(event,'${e.id}')">✕</button>
          </div>
        </div>`;
      }).join('');
    }

    async function loadArchiveEntry(id) {
      const entry  = await fetch(`/archive/${id}`).then(r => r.json());
      currentJobId = id;
      isLiveJob    = false;
      audioPlayer.src = entry.audio_ext ? `/archive/${id}/audio` : '';
      setResultTitle(entry.filename || '');
      showSegments(entry.segments, entry.speaker_names || {});
      document.getElementById('archive-view').style.display = 'none';
      document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
      resultSec.style.display = 'block';
      if (entry.summary) {
        document.getElementById('summary-section').style.display = 'block';
        renderSummaryText(entry.summary);
        document.getElementById('summarize-btn').textContent = '↻ Regenerate';
      }
    }

    async function deleteEntry(evt, id) {
      evt.stopPropagation();
      await fetch(`/archive/${id}`, { method: 'DELETE' });
      loadArchive();
    }

    function startArchiveRename(evt, id, btn) {
      evt.stopPropagation();
      const nameEl = btn.closest('.archive-entry').querySelector('.entry-name');
      const prev   = nameEl.textContent;
      const input  = document.createElement('input');
      input.className = 'rename-input';
      input.value = prev;
      nameEl.replaceWith(input);
      input.focus(); input.select();
      let committed = false;
      async function commit() {
        if (committed) return; committed = true;
        const val = input.value.trim() || prev;
        const newEl = document.createElement('div');
        newEl.className = 'entry-name'; newEl.textContent = val;
        input.replaceWith(newEl);
        await fetch(`/archive/${id}/rename`, {
          method: 'PATCH', headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ filename: val })
        });
        if (currentJobId === id) setResultTitle(val);
      }
      input.addEventListener('blur', commit);
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
        if (e.key === 'Escape') { input.value = prev; input.blur(); }
      });
    }

    function activateRenameTitle() {
      const span = document.getElementById('result-title');
      const prev = span.textContent;
      const row  = span.parentElement;
      const input = document.createElement('input');
      input.className = 'rename-input';
      input.style.fontFamily = 'Georgia, serif';
      input.style.fontSize   = '1.05rem';
      input.value = prev;
      span.replaceWith(input);
      input.focus(); input.select();
      let committed = false;
      async function commit() {
        if (committed) return; committed = true;
        const val = input.value.trim() || prev;
        const newSpan = document.createElement('span');
        newSpan.id = 'result-title'; newSpan.className = 'result-title';
        newSpan.textContent = val;
        input.replaceWith(newSpan);
        currentFilename = val;
        if (currentJobId) {
          await fetch(`/archive/${currentJobId}/rename`, {
            method: 'PATCH', headers: {'Content-Type':'application/json'},
            body: JSON.stringify({ filename: val })
          });
        }
      }
      input.addEventListener('blur', commit);
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
        if (e.key === 'Escape') { input.value = prev; input.blur(); }
      });
    }

    function fmtDuration(s) {
      if (!s) return '—';
      const m = Math.floor(s / 60), sec = Math.floor(s % 60);
      return m > 0 ? `${m}m ${sec}s` : `${sec}s`;
    }

    // ── Input mode toggle ─────────────────────────────────────────────────────

    function switchInputMode(mode) {
      document.getElementById('mode-upload-btn').classList.toggle('active', mode === 'upload');
      document.getElementById('mode-record-btn').classList.toggle('active', mode === 'record');
      document.getElementById('upload-content').style.display  = mode === 'upload' ? 'block' : 'none';
      document.getElementById('record-content').style.display  = mode === 'record' ? 'block' : 'none';
      if (mode === 'record') populateDevices();
    }

    // ── Recording ─────────────────────────────────────────────────────────────

    let mediaRecorder   = null;
    let recordedChunks  = [];
    let recordingStream = null;
    let meterRaf        = null;
    let timerInterval   = null;
    let recordStartTime = null;
    let isRecording     = false;

    async function populateDevices() {
      try {
        const devices = await navigator.mediaDevices.enumerateDevices();
        const inputs  = devices.filter(d => d.kind === 'audioinput');
        const sel     = document.getElementById('audio-device');
        sel.innerHTML = inputs.map(d =>
          `<option value="${d.deviceId}">${escapeHtml(d.label || 'Microphone ' + d.deviceId.slice(0,6))}</option>`
        ).join('');
      } catch (e) { console.warn('enumerateDevices:', e); }
    }

    async function toggleRecording() {
      isRecording ? stopRecording() : await startRecording();
    }

    async function startRecording() {
      const deviceId = document.getElementById('audio-device').value;
      try {
        const constraints = {
          audio: deviceId
            ? { deviceId: { exact: deviceId }, echoCancellation: false, noiseSuppression: false, autoGainControl: false }
            : { echoCancellation: false, noiseSuppression: false, autoGainControl: false }
        };
        recordingStream = await navigator.mediaDevices.getUserMedia(constraints);
      } catch (e) {
        alert('Kein Zugriff auf das Audiogerät: ' + e.message);
        return;
      }

      await populateDevices(); // re-enumerate with real labels now that permission is granted

      isRecording    = true;
      recordedChunks = [];
      mediaRecorder  = new MediaRecorder(recordingStream);
      mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
      mediaRecorder.onstop = onRecordingStop;
      mediaRecorder.start(1000);

      startMeter(recordingStream);
      startRecordTimer();

      const btn = document.getElementById('record-btn');
      btn.textContent = 'Stop & Transcribe';
      btn.classList.add('recording');
      document.getElementById('record-box').classList.add('active');
      document.getElementById('record-status-text').textContent = 'Recording…';
    }

    function stopRecording() {
      if (mediaRecorder?.state !== 'inactive') mediaRecorder.stop();
      recordingStream?.getTracks().forEach(t => t.stop());
      stopMeter();
      stopRecordTimer();
      isRecording = false;

      const btn = document.getElementById('record-btn');
      btn.textContent = 'Start Recording';
      btn.classList.remove('recording');
      document.getElementById('record-box').classList.remove('active');
      document.getElementById('record-status-text').textContent = 'Processing…';
    }

    function onRecordingStop() {
      const mime = MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : 'audio/ogg';
      const ext  = mime.includes('webm') ? 'webm' : 'ogg';
      const blob = new Blob(recordedChunks, { type: mime });
      const ts   = new Date().toISOString().slice(0,16).replace('T','_').replaceAll(':','-');
      const file = new File([blob], `Recording_${ts}.${ext}`, { type: mime });

      // Copy speaker hints to upload inputs, then hand off to existing pipeline
      document.getElementById('min-speakers').value = document.getElementById('rec-min-speakers').value;
      document.getElementById('max-speakers').value = document.getElementById('rec-max-speakers').value;
      switchInputMode('upload');
      setFile(file);
      transcribeBtn.click();
    }

    // ── Level meter ───────────────────────────────────────────────────────────

    function startMeter(stream) {
      const ctx    = new AudioContext();
      const node   = ctx.createAnalyser();
      node.fftSize = 256;
      ctx.createMediaStreamSource(stream).connect(node);
      const data   = new Uint8Array(node.frequencyBinCount);
      const fill   = document.getElementById('meter-fill');
      function tick() {
        node.getByteFrequencyData(data);
        const avg = data.reduce((a, b) => a + b, 0) / data.length;
        fill.style.width = Math.min(100, avg * 3) + '%';
        meterRaf = requestAnimationFrame(tick);
      }
      tick();
    }

    function stopMeter() {
      if (meterRaf) cancelAnimationFrame(meterRaf);
      meterRaf = null;
      const fill = document.getElementById('meter-fill');
      if (fill) fill.style.width = '0%';
    }

    // ── Record timer ──────────────────────────────────────────────────────────

    function startRecordTimer() {
      recordStartTime = Date.now();
      const el = document.getElementById('record-timer');
      timerInterval = setInterval(() => {
        const ms = Date.now() - recordStartTime;
        const h  = Math.floor(ms / 3600000).toString().padStart(2, '0');
        const m  = Math.floor((ms % 3600000) / 60000).toString().padStart(2, '0');
        const s  = Math.floor((ms % 60000) / 1000).toString().padStart(2, '0');
        el.textContent = `${h}:${m}:${s}`;
      }, 1000);
    }

    function stopRecordTimer() {
      clearInterval(timerInterval);
      timerInterval = null;
      document.getElementById('record-timer').textContent = '00:00:00';
    }

    // ── Settings ──────────────────────────────────────────────────────────────

    const PROVIDERS = [
      { id: 'lmstudio',  label: 'LM Studio' },
      { id: 'ollama',    label: 'Ollama' },
      { id: 'gemini',    label: 'Gemini' },
      { id: 'anthropic', label: 'Anthropic' },
      { id: 'openai',    label: 'OpenAI' },
    ];

    const LOCAL_PROVIDERS = new Set(['lmstudio', 'ollama']);
    const DEFAULT_URLS    = { lmstudio: 'http://localhost:1234', ollama: 'http://localhost:11434' };

    let _settingsProvider = 'lmstudio';
    let _savedApiKey = '';  // tracks whether a key is already saved (so we don't wipe it)

    async function openSettings() {
      const overlay = document.getElementById('settings-overlay');
      overlay.style.display = 'flex';
      document.getElementById('test-result').textContent = '';
      document.getElementById('test-result').className = 'test-result';

      const cfg = await fetch('/settings').then(r => r.json());
      _settingsProvider = cfg.provider || 'lmstudio';
      _savedApiKey = cfg.api_key_set ? '__saved__' : '';

      renderProviderTiles(_settingsProvider);
      await renderSettingsFields(_settingsProvider, cfg);
    }

    async function fetchModels(provider, baseUrl) {
      try {
        const res = await fetch('/models', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ provider, base_url: baseUrl || '' }),
        });
        return await res.json();
      } catch (e) {
        return { models: [], error: String(e) };
      }
    }

    function closeSettings() {
      document.getElementById('settings-overlay').style.display = 'none';
    }

    function closeSettingsIfOutside(e) {
      if (e.target === document.getElementById('settings-overlay')) closeSettings();
    }

    function renderProviderTiles(active) {
      document.getElementById('provider-tiles').innerHTML = PROVIDERS.map(p =>
        `<button class="provider-tile${p.id === active ? ' active' : ''}" onclick="selectProvider('${p.id}')">${p.label}</button>`
      ).join('');
    }

    async function renderSettingsFields(provider, cfg = {}) {
      const fields = document.getElementById('settings-fields');
      const isLocal = LOCAL_PROVIDERS.has(provider);
      const urlVal = cfg.base_url || DEFAULT_URLS[provider] || '';

      if (isLocal) {
        fields.innerHTML = `
          <div class="settings-field">
            <label>Base URL</label>
            <input type="text" id="sf-url" value="${escapeHtml(urlVal)}" placeholder="${DEFAULT_URLS[provider]}">
          </div>
          <div class="settings-field">
            <label>Model</label>
            <select id="sf-model" disabled><option>Loading…</option></select>
            <div class="model-hint" id="sf-model-hint"></div>
          </div>`;
        document.getElementById('sf-url').addEventListener('blur', () => populateModelDropdown(provider, cfg.model));
      } else {
        const keyPlaceholder = cfg.api_key_set ? '••••••••••••••••••••' : 'Enter API key';
        fields.innerHTML = `
          <div class="settings-field">
            <label>API Key</label>
            <div class="key-row">
              <input type="password" id="sf-key" placeholder="${keyPlaceholder}" autocomplete="off">
              <button class="eye-btn" onclick="toggleKeyVisibility()" id="eye-btn">👁</button>
            </div>
          </div>
          <div class="settings-field">
            <label>Model</label>
            <select id="sf-model" disabled><option>Loading…</option></select>
            <div class="model-hint" id="sf-model-hint"></div>
          </div>`;
      }
      document.getElementById('test-result').textContent = '';
      document.getElementById('test-result').className = 'test-result';

      await populateModelDropdown(provider, cfg.model);
    }

    async function populateModelDropdown(provider, savedModel) {
      const select = document.getElementById('sf-model');
      const hint   = document.getElementById('sf-model-hint');
      if (!select) return;
      const baseUrl = LOCAL_PROVIDERS.has(provider) ? (document.getElementById('sf-url')?.value || DEFAULT_URLS[provider]) : '';
      select.disabled = true;
      select.innerHTML = '<option>Loading…</option>';
      hint.textContent = '';
      hint.className = 'model-hint';

      const { models = [], error } = await fetchModels(provider, baseUrl);

      if (error) {
        select.innerHTML = '<option value="">— unavailable —</option>';
        hint.textContent = error;
        hint.className = 'model-hint error';
        return;
      }
      if (models.length === 0) {
        select.innerHTML = '<option value="">— no models found —</option>';
        if (provider === 'lmstudio') hint.textContent = 'Load a model in LM Studio and try again.';
        if (provider === 'ollama')   hint.textContent = 'Pull a model first, e.g. `ollama pull llama3.2:3b`.';
        return;
      }

      const options = models.map(m =>
        `<option value="${escapeHtml(m)}"${m === savedModel ? ' selected' : ''}>${escapeHtml(m)}</option>`
      );
      // If saved model is not in the fetched list, add it as a sticky option so it stays selected
      if (savedModel && !models.includes(savedModel)) {
        options.unshift(`<option value="${escapeHtml(savedModel)}" selected>${escapeHtml(savedModel)} (saved, not currently available)</option>`);
      }
      select.innerHTML = options.join('');
      select.disabled = false;
    }

    async function selectProvider(provider) {
      _settingsProvider = provider;
      _savedApiKey = '';
      renderProviderTiles(provider);
      await renderSettingsFields(provider);
    }

    function toggleKeyVisibility() {
      const inp = document.getElementById('sf-key');
      const btn = document.getElementById('eye-btn');
      if (!inp) return;
      inp.type = inp.type === 'password' ? 'text' : 'password';
      btn.textContent = inp.type === 'password' ? '👁' : '🙈';
    }

    function collectSettingsPayload() {
      const isLocal = LOCAL_PROVIDERS.has(_settingsProvider);
      const payload = { provider: _settingsProvider };
      if (isLocal) {
        payload.base_url = (document.getElementById('sf-url')?.value || '').trim();
        payload.model    = (document.getElementById('sf-model')?.value || '').trim();
        payload.api_key  = '';
      } else {
        const keyInput = document.getElementById('sf-key')?.value || '';
        payload.api_key = keyInput || (_savedApiKey === '__saved__' ? '__keep__' : '');
        payload.model   = (document.getElementById('sf-model')?.value || '').trim();
        payload.base_url = '';
      }
      return payload;
    }

    async function testProvider() {
      const payload = collectSettingsPayload();
      const btn = document.getElementById('test-btn');
      const res = document.getElementById('test-result');
      btn.disabled = true;
      res.textContent = 'Testing…';
      res.className = 'test-result';

      const data = await fetch('/settings/test', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      }).then(r => r.json());

      btn.disabled = false;
      res.textContent = data.ok ? '✓ ' + data.message : '✗ ' + data.message;
      res.className = 'test-result ' + (data.ok ? 'ok' : 'error');
    }

    async function saveSettings() {
      const payload = collectSettingsPayload();
      // Don't overwrite saved key if field was left blank
      if (payload.api_key === '__keep__') {
        const saved = await fetch('/settings').then(r => r.json());
        // Keep existing key — only update provider/model
        const updatePayload = { provider: payload.provider, base_url: payload.base_url, model: payload.model };
        await fetch('/settings', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(updatePayload),
        });
      } else {
        await fetch('/settings', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
      }
      _savedApiKey = payload.api_key ? '__saved__' : _savedApiKey;
      const btn = document.getElementById('settings-save-btn');
      const prev = btn.textContent;
      btn.textContent = 'Saved ✓';
      btn.style.background = '#3d6b50';
      btn.style.borderColor = '#3d6b50';
      setTimeout(() => {
        btn.textContent = prev;
        btn.style.background = '';
        btn.style.borderColor = '';
      }, 2000);
    }

    // ── Summarize ─────────────────────────────────────────────────────────────

    let _summaryEs = null;

    async function requestSummary() {
      if (!currentJobId) return;

      // Check provider is configured
      const cfg = await fetch('/settings').then(r => r.json());
      const summarySection  = document.getElementById('summary-section');
      const summaryContent  = document.getElementById('summary-content');
      const summaryLoading  = document.getElementById('summary-loading');
      const summaryError    = document.getElementById('summary-error');
      const summarizeBtn    = document.getElementById('summarize-btn');

      summarySection.style.display = 'block';
      document.getElementById('summary-chevron').classList.remove('collapsed');
      document.getElementById('summary-body').style.display = '';

      if (!cfg.provider) {
        summaryContent.innerHTML = '';
        summaryLoading.style.display = 'none';
        summaryError.style.display = 'block';
        summaryError.innerHTML = 'No AI provider configured. Open Settings (⚙ top right) to set one up.';
        return;
      }

      summaryError.style.display = 'none';
      summaryLoading.style.display = 'flex';
      document.getElementById('summary-stage-text').textContent = 'Summarizing…';
      summaryContent.innerHTML = '';
      summarizeBtn.disabled = true;

      if (_summaryEs) { _summaryEs.close(); _summaryEs = null; }

      let accumulated = '';
      _summaryEs = new EventSource(`/summarize/${currentJobId}`);
      _summaryEs.onmessage = e => {
        const data = JSON.parse(e.data);
        if (data.type === 'token') {
          accumulated += data.text;
          summaryContent.textContent = accumulated;
        }
        if (data.type === 'done') {
          _summaryEs.close(); _summaryEs = null;
          summaryLoading.style.display = 'none';
          renderSummaryText(data.summary);
          summarizeBtn.textContent = '↻ Regenerate';
          summarizeBtn.disabled = false;
        }
        if (data.type === 'error') {
          _summaryEs.close(); _summaryEs = null;
          summaryLoading.style.display = 'none';
          summaryContent.innerHTML = '';
          summaryError.style.display = 'block';
          summaryError.textContent = data.message;
          summarizeBtn.disabled = false;
        }
      };
      _summaryEs.onerror = () => {
        _summaryEs.close(); _summaryEs = null;
        summaryLoading.style.display = 'none';
        summaryError.style.display = 'block';
        summaryError.textContent = 'Connection error — is the server running?';
        summarizeBtn.disabled = false;
      };
    }

    function renderSummaryText(text) {
      const content = document.getElementById('summary-content');
      if (!text) { content.textContent = ''; return; }
      // Convert lines starting with - or • into an <ul>
      const lines = text.split('\n').filter(l => l.trim());
      const hasBullets = lines.some(l => /^[-•*]/.test(l.trim()));
      if (hasBullets) {
        const items = lines.map(l => {
          const trimmed = l.trim().replace(/^[-•*]\s*/, '');
          return trimmed ? `<li>${escapeHtml(trimmed)}</li>` : '';
        }).join('');
        content.innerHTML = `<ul>${items}</ul>`;
      } else {
        content.innerHTML = lines.map(l => `<p>${escapeHtml(l)}</p>`).join('');
      }
    }

    function toggleSummaryPanel() {
      const body    = document.getElementById('summary-body');
      const chevron = document.getElementById('summary-chevron');
      const hidden  = body.style.display === 'none';
      body.style.display = hidden ? '' : 'none';
      chevron.classList.toggle('collapsed', !hidden);
    }

    function resetSummaryPanel() {
      document.getElementById('summary-section').style.display = 'none';
      document.getElementById('summary-content').innerHTML = '';
      document.getElementById('summary-loading').style.display = 'none';
      document.getElementById('summary-error').style.display = 'none';
      document.getElementById('summary-body').style.display = '';
      document.getElementById('summary-chevron').classList.remove('collapsed');
      const btn = document.getElementById('summarize-btn');
      btn.textContent = '✦ Summarize';
      btn.disabled = false;
      if (_summaryEs) { _summaryEs.close(); _summaryEs = null; }
    }
  </script>
</body>
